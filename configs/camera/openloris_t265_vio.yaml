%YAML:1.0
# OpenLORIS-Scene, RealSense T265 dual-fisheye stereo + IMU (VIO).
# body frame := T265 IMU (accelerometer/gyroscope), so cam0/cam1 T are IMU->camera (Tbc).
# Extrinsics derived from trans_matrix.yaml (fisheye1->accel, fisheye1->fisheye2).

image_height: 800
image_width: 848
use_imu: 1

depth_lower_thr: 0.1
depth_upper_thr: 10.0
max_y_diff: 2

# Calibration
distortion_type: 2  # 0 undistorted, 1 radial-tangential, 2 equidistant/fisheye (Kannala-Brandt): [k1,k2,k3,k4,0]
cam0:
  intrinsics: [284.98089599609375, 286.10238647460938, 425.2443847656250, 398.46759033203125] # fx, fy, cx, cy  (sensors.yaml stores [fx,cx,fy,cy])
  distortion_coeffs: [-7.3047108016908169e-03, 4.3499931693077087e-02, -4.1283041238784790e-02, 7.6524601317942142e-03, 0]
  T_type: 0           # 0 => T is Tbc (camera pose in body/IMU frame)
  T:  # IMU -> fisheye1
  - [-9.9992633142e-01, -4.9039224757e-03, 1.1103300579e-02, 1.0699210334e-02]
  - [4.9341275781e-03, -9.9998419659e-01, 2.6946141507e-03, -5.2795150761e-05]
  - [1.1089910930e-02, 2.7492007439e-03, 9.9993472576e-01, -1.1866200220e-04]
  - [0.0, 0.0, 0.0, 1.0]
cam1:
  intrinsics: [284.81259155273438, 285.97601318359375, 427.6615905761719, 397.12341308593750] # fx, fy, cx, cy  (sensors.yaml stores [fx,cx,fy,cy])
  distortion_coeffs: [-6.3794981688261032e-03, 4.1455611586570740e-02, -3.9464488625526428e-02, 6.9808149710297585e-03, 0]
  T_type: 0
  T:  # IMU -> fisheye2
  - [-9.9998975212e-01, -1.7762055351e-03, 4.1642216575e-03, -5.3277739371e-02]
  - [1.8032009396e-03, -9.9997732733e-01, 6.4879343814e-03, 1.1353460694e-04]
  - [4.1526033385e-03, 6.4953768223e-03, 9.9997028254e-01, 1.9279706451e-04]
  - [0.0, 0.0, 0.0, 1.0]

# IMU (T265 BMI055; noise ~ EuRoC-order, proven with AirSLAM; tune if unstable)
rate_hz: 200
gyroscope_noise_density: 1.6968e-04     # [ rad / s / sqrt(Hz) ]
gyroscope_random_walk: 1.9393e-05       # [ rad / s^2 / sqrt(Hz) ]
accelerometer_noise_density: 2.0000e-3  # [ m / s^2 / sqrt(Hz) ]
accelerometer_random_walk: 3.0000e-3    # [ m / s^3 / sqrt(Hz) ]
g_value: 9.81007
