use_dino: 1        # AnyLoc (ViT-G/VLAD) cross-condition relocalization
dino_model: anyloc
dino_topk: 10
min_inlier_num: 30
pose_refinement: 1

plnet:
  use_superpoint: 0
  max_keypoints: 400
  keypoint_threshold: 0.004
  remove_borders: 4
  line_threshold: 0.8
  line_length_threshold: 50

point_matcher:
  matcher: 0
  image_width: 848
  image_height: 800
  onnx_file: "superpoint_lightglue.onnx"
  engine_file: "superpoint_lightglue.engine"

pose_estimation:
  mono_point: 50
  stereo_point: 75
  mono_line: 50
  stereo_line: 75
  rate: 0.5

ros_publisher:
  feature: 0
  feature_topic: "/AirSLAM/feature"
  frame_pose: 0
  frame_pose_topic: "/AirSLAM/frame_pose"
  frame_odometry_topic: "/AirSLAM/LatestOdometry"
  keyframe: 0
  keyframe_topic: "/AirSLAM/keyframe"
  path_topic: "/AirSLAM/odometry"
  map: 0
  map_topic: "/AirSLAM/map"
  mapline: 0
  mapline_topic: "/AirSLAM/mapline"
  reloc: 0
  reloc_topic: "/AirSLAM/reloc"
